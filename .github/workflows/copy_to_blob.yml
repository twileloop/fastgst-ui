name: Build and Deploy to Bunny CDN

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Eleventy + Tailwind CSS)
        run: npm run build

      - name: Upload to Bunny CDN
        env:
          BUNNY_STORAGE_KEY: ${{ secrets.BUNNY_STORAGE_KEY }}
          BUNNY_STORAGE_NAME: ${{ secrets.BUNNY_STORAGE_NAME }}
        run: |
          find _site -type f | while read file; do
            relative="${file#_site/}"
            echo "Uploading $relative..."
            curl --fail --silent --show-error \
              --request PUT \
              --url "https://sg.storage.bunnycdn.com/${BUNNY_STORAGE_NAME}/${relative}" \
              --header "AccessKey: ${BUNNY_STORAGE_KEY}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary "@${file}"
          done
